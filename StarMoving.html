<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarsMoving</title>
</head>
<style>
    body{
        background-color: black;
    }
    img{
        margin-top: 150px;
        margin-left: 100px;
    }
</style>
<body>
   <img src="Stars.png" alt=""> 
</body>
<script>
    let image=document.querySelector("img")
document.addEventListener("mousemove" , (e)=>{
    console.log(e.x)
     console.log(e.y)
image.style.marginTop=`${e.y}px`
image.style.marginLeft=`${e.x}px`

})

</script>
</html>
